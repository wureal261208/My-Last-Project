# Fly.io config for the BookWorm backend (server/). Deploy with `fly launch`
# the first time (it will offer to use this file), then `fly deploy` after.
# Set secrets before deploying: fly secrets set MONGODB_URI=... ADMIN_EMAILS=... FIREBASE_SERVICE_ACCOUNT='...'
app = "bookworm-server"
primary_region = "sin"

[build]

[env]
  PORT = "4000"
  MONGODB_DB_NAME = "schema"
  SYNC_INTERVAL_MS = "15000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"
